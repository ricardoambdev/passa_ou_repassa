services:
  - type: web
    name: passa-ou-repassa
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npx next start --port $PORT
    healthCheckPath: /
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        value: file:/data/dev.db
      - key: JWT_SECRET
        sync: false
